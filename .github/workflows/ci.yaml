name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  docker:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      ##########################################
      # Build & Push Ad Service
      ##########################################

      - name: Build Ad Service
        uses: docker/build-push-action@v6
        with:
          context: ./src/ad
          push: true
          tags: |
            akashp490/adservice:latest
            akashp490/adservice:${{ github.sha }}

      ##########################################
      # Build & Push Product Catalog
      ##########################################

      - name: Build Product Catalog
        uses: docker/build-push-action@v6
        with:
          context: ./src/product-catalog
          push: true
          tags: |
            akashp490/product-catalog:latest
            akashp490/product-catalog:${{ github.sha }}

      ##########################################
      # Build & Push Recommendation
      ##########################################

      - name: Build Recommendation
        uses: docker/build-push-action@v6
        with:
          context: ./src/recommendation
          push: true
          tags: |
            akashp490/recommendation:latest
            akashp490/recommendation:${{ github.sha }}


             