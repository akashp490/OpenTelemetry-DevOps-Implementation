name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'kubernetes/**'

      
jobs:
  docker:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      ##########################################
      # Build & Push Ad Service
      ##########################################

      - name: Build Ad Service
        uses: docker/build-push-action@v6
        with:
          context: ./src/ad
          push: true
          tags: |
            akashp490/adservice:${{ github.sha }}

      ##########################################
      # Build & Push Product Catalog
      ##########################################

      - name: Build Product Catalog
        uses: docker/build-push-action@v6
        with:
          context: ./src/product-catalog
          push: true
          tags: |
            akashp490/product-catalog:${{ github.sha }}

      ##########################################
      # Build & Push Recommendation
      ##########################################

      - name: Build Recommendation
        uses: docker/build-push-action@v6
        with:
          context: ./src/recommendation
          push: true
          tags: |
           akashp490/recommendation:${{ github.sha }}


  update-manifests:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}

      - name: Update image tags in manifests
        run: |
          sed -i "s|image: akashp490/adservice:.*|image: akashp490/adservice:${{ github.sha }}|" kubernetes/ad/deploy.yaml
          sed -i "s|image: akashp490/product-catalog:.*|image: akashp490/product-catalog:${{ github.sha }}|" kubernetes/product-catalog/deploy.yaml
          sed -i "s|image: akashp490/recommendation:.*|image: akashp490/recommendation:${{ github.sha }}|" kubernetes/recommendation/deploy.yaml

      - name: Commit and push changes
        run: |
          git config --global user.email "akashpatro490@gmail.com"
          git config --global user.name "Akash Patro"
          git add kubernetes/*/deploy.yaml
          git commit -m "Update image tags to ${{ github.sha }}"
          git push       