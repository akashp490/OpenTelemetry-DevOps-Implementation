apiVersion: apps/v1
kind: Deployment

metadata:
  name: product-catalog

spec:
  replicas: 1

  selector:
    matchLabels:
      app: product-catalog

  template:
    metadata:
      labels:
        app: product-catalog

    spec:
      

      containers:
        - name: product-catalog
          image: akashp490/product-catalog:latest
          imagePullPolicy: Always


          env:

          - name: OTEL_SERVICE_NAME
            value: product-catalog

          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"  