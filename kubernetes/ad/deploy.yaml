apiVersion: apps/v1
kind: Deployment

metadata:
  name: ad

spec:
  replicas: 1
  revisionHistoryLimit: 2

  selector:
    matchLabels:
      app: ad

  template:
    metadata:
      labels:
        app: ad

    spec:
      

      containers:
        - name: ad
          image: akashp490/adservice:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8080
          env:
            - name: AD_PORT
              value: "8080"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"  