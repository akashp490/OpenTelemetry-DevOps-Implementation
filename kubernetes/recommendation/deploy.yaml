apiVersion: apps/v1
kind: Deployment

metadata:
  name: recommendation

spec:
  replicas: 1

  selector:
    matchLabels:
      app: recommendation

  template:
    metadata:
      labels:
        app: recommendation

    spec:
      
      containers:
        - name: recommendation
          image: akashp490/recommendation:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"  

          env:
          - name: RECOMMENDATION_PORT
            value: "8080"

          - name: OTEL_SERVICE_NAME
            value: recommendation

          - name: PRODUCT_CATALOG_ADDR
            value: "product-catalog-svc:8080"